{% extends 'base.html' %}

{% block content %}

<div class="card shadow-sm w-75">

    <div class="card-body">

        <h2 class="mb-4">
            Modifier commentaire
        </h2>

        <form method="POST">

            {% csrf_token %}

            <div class="mb-3">
                {{ form.message }}
            </div>

            <button type="submit"
                    class="btn btn-warning">
                Modifier
            </button>

        </form>

    </div>

</div>

{% endblock %}
